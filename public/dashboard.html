<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#171713" />
  <title>Se Fode — Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="noise"></div>
  <main class="dash">
    <header class="dash-top">
      <a class="mini-brand" href="/">SE FODE</a>
      <div class="dash-title">DASHBOARD ADMIN</div>
      <a href="/" class="dash-back">← VOLTAR AO JOGO</a>
    </header>

    <div id="dash-gate" class="dash-gate">Carregando…</div>

    <section id="dash-content" class="dash-content hidden">
      <div class="dash-stats" id="dash-stats"></div>

      <h2 class="dash-section-title">USUÁRIOS</h2>
      <div class="dash-table-wrap">
        <table class="dash-table">
          <thead>
            <tr>
              <th>Usuário</th>
              <th>E-mail</th>
              <th>Papel</th>
              <th>Vitórias</th>
              <th>Jogos</th>
              <th>Cadastro</th>
              <th>Último login</th>
              <th>Banner</th>
            </tr>
          </thead>
          <tbody id="dash-rows"></tbody>
        </table>
      </div>

      <h2 class="dash-section-title">FIGURINHAS</h2>
      <p class="dash-hint">Ative/desative, exclua ou adicione novas figurinhas. As desativadas somem da barra do jogo.</p>
      <form id="emote-form" class="emote-form" onsubmit="return false">
        <div class="emote-form-row">
          <label>CHAVE<input id="emote-key" maxlength="20" placeholder="ex: chapa" /></label>
          <label>NOME<input id="emote-title" maxlength="24" placeholder="ex: Chapa" /></label>
          <label>EMOJI<input id="emote-emoji" maxlength="8" placeholder="😄" /></label>
          <label>IMAGEM<input id="emote-image" type="file" accept="image/png,image/jpeg,image/webp,image/gif" /></label>
        </div>
        <button id="emote-add" class="dash-btn">+ ADICIONAR FIGURINHA</button>
        <span id="emote-form-msg" class="emote-form-msg"></span>
      </form>
      <div id="emote-grid" class="emote-grid"></div>
    </section>
  </main>
  <div id="toast" role="status"></div>
  <script type="module" src="/dashboard.js"></script>
</body>
</html>
